{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSnip</title>
    <link rel="stylesheet" href="{% static 'shortener/styles.css' %}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><a href="{% url 'shortener:home' %}">LinkSnip</a></h1>
            <nav>
                <a href="{% url 'shortener:home' %}">Home</a>
                <a href="{% url 'shortener:list' %}">All Links</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <p>Simple URL shortener built with Django.</p>
        </div>
    </footer>
</body>
</html>
